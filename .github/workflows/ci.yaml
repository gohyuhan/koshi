name: ci

on:
  push:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  formatting:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Installs the toolchain pinned in rust-toolchain.toml (channel +
      # rustfmt/clippy components) and configures build caching. No version
      # is named here, so the pin file stays the single source of truth.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: "" # keep the workflow-level RUSTFLAGS (-D warnings)

      - name: Format
        run: cargo fmt --all -- --check

      # --locked: CI must build exactly what Cargo.lock pins, never a
      # silently-updated transitive dependency.
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  dep-guard:
    name: dependency guard
    runs-on: ubuntu-latest
    needs: formatting
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Dependency-direction guard
        run: cargo xtask dep-guard

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    needs: dep-guard
    steps:
      - uses: actions/checkout@v6

      # Audits dependencies against deny.toml. Pin the compiler to the
      # project version so cargo-deny reads the v4 Cargo.lock with a modern
      # cargo (the action image ships an older default).
      - name: Audit dependencies
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.0"
          command: check advisories bans licenses sources

  test:
    name: test (${{ matrix.os }})
    needs: cargo-deny
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Check
        run: cargo check --workspace --all-targets --locked

      # --no-fail-fast: run every crate's tests even after one fails, so a
      # cross-OS run reports all failures in a single pass, not one per push.
      - name: Test
        run: cargo test --workspace --all-features --locked --no-fail-fast
